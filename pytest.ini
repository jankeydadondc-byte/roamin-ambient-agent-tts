[pytest]
# Custom markers
markers =
    integration: requires live services (Control API, LM Studio, GPU) — run with: pytest -m integration

# Prevent pytest from recursing into the N.E.K.O repository (external build info)
norecursedirs = .git .venv N.E.K.O workspace

# Keep test discovery focused on the project's `tests/` directory
testpaths = tests

# Use a local basetemp dir instead of system temp — avoids Windows symlink permission errors
# (creating/deleting symlinks in system temp requires elevated privileges)
addopts = --basetemp=.pytest_tmp --import-mode=importlib

# Retain no temp dirs after runs (keeps .pytest_tmp/ clean)
tmp_path_retention_policy = none
