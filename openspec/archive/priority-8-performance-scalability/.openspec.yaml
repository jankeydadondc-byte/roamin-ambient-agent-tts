# Notes & Constraints
notes:
  - PS5.1 ONLY — no &&, no ||, no ?:, no here-strings in PowerShell
  - Python changes require py_compile + flake8 --max-line-length=120 before commit
  - Use Path(__file__).parent for all paths (no hardcoded absolute paths)
  - No debug print() in committed code
