# Priority 8: Performance & Scalability Optimization Proposal
version: 1
created: 2026-04-11T22:00:00Z
status: active
phase: implementation
author: Asherre (solo, neurodivergent)

# Summary
title: "Priority 8 — Asynchronous Tasks, Resource Monitoring, and Cleanup"
description: >
  Optimize Roamin's responsiveness and resource efficiency by replacing blocking I/O with async,
  adding CPU/GPU/RAM monitoring with throttling triggers, and implementing background task cleanup.
  KV cache quantization deferred due to accuracy tradeoffs on current VRAM headroom.

# Implementation Scope
scope:
  - milestone: 1
    title: "Asynchronous Task Execution"
    status: in_progress
    rationale: "I/O-bound operations (web search, file reads) can run in parallel without blocking UI"

  - milestone: 2
    title: "Resource Monitoring & Throttling"
    status: pending
    rationale: "Prevent agent freezes during web searches and file operations; add visibility via /health endpoint"

  - milestone: 3
    title: "Background Task Cleanup"
    status: pending
    rationale: "Prevent SQLite bloat and memory leaks from long-running agent sessions"

  # KV Quantization deferred (accuracy tradeoff not worth it with current VRAM headroom >15GB)
  - milestone: 4
    title: "KV Cache Quantization"
    status: deferred
    reason: "Lower precision may reduce reasoning coherence on extended conversations. Not needed with current VRAM budget."

# Risk Assessment
risk_matrix:
  breaking_change: true
  severity: 2
  mitigation: "Feature flag ROAMIN_USE_ASYNC (default off), enable gradually after testing"

  performance_impact: neutral
  note: "Async refactor may slightly improve throughput, but no guarantee until benchmarked"

  security_risk: false

# Technical Design Overview
design:
  new_files:
    - agent/core/async_utils.py
    - agent/core/resource_monitor.py

  modified_files:
    - agent/core/agent_loop.py (refactor _execute_step to use asyncio.gather)
    - agent/control_api.py (add /health endpoint)
    - run_wake_listener.py (add cleanup scheduler)

  key_patterns:
    - Replace ThreadPoolExecutor with asyncio.gather for parallel tool execution
    - Add resource checks before task steps (CPU/GPU/RAM > threshold → throttle)
    - Periodic SQLite cleanup task (older than 24h)

# Testing Strategy
test_strategy:
  unit_tests:
    target: "All async utilities, resource checks"
    tools: ["pytest", "asyncio fixtures"]

  integration_tests:
    target: "/health endpoint, task cleanup API"
    tools: ["Control API + WebSocket events"]

  coverage_target: 250/261 tests passing

