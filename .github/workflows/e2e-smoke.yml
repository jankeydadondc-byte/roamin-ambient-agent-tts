name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  # ---------------------------------------------------------------
  # Job 1: Unit tests (fast, no server required)
  # ---------------------------------------------------------------
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest -q tests/unit/

      - name: Upload unit test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            .pytest_cache/
          if-no-files-found: ignore

  # ---------------------------------------------------------------
  # Job 2: E2E smoke tests (requires running Control API)
  # ---------------------------------------------------------------
  e2e:
    name: E2E Smoke Test
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Control API
        run: |
          nohup python run_control_api.py > control_api.log 2>&1 &
          echo "started"

      - name: Wait for Control API
        run: |
          for i in {1..30}; do
            if curl -sS http://127.0.0.1:8765/status >/dev/null; then
              echo "control api up"; exit 0
            fi
            sleep 1
          done
          echo "control api failed to start"
          tail -n 50 control_api.log || true
          exit 1

      - name: Run E2E smoke tests
        run: pytest -q tests/test_e2e_smoke.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: |
            control_api.log
          if-no-files-found: warn
